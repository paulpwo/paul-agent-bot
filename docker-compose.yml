services:
  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── PaulAgentBot web (Next.js dashboard + webhook receivers) ───────────────────────
  paulagentbot:
    image: ${PAULAGENTBOT_IMAGE}
    restart: unless-stopped
    command: ["sh", "-c", "node node_modules/prisma/build/index.js migrate deploy && node server.js"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Claude Code auth — bind-mount host ~/.claude into container at /root/.claude.
      # Set CLAUDE_AUTH_DIR in .env to the path of ~/.claude on this host machine.
      # On EC2: /root/.claude or /home/ubuntu/.claude
      - type: bind
        source: ${CLAUDE_AUTH_DIR}
        target: /root/.claude
        read_only: true
      # Persistent workspace for cloned repos (on EBS)
      - type: bind
        source: /data/workspaces
        target: /data/workspaces
      # SQLite database file (on EBS — survives container recreation).
      # IMPORTANT: create this file before first run: touch /data/paulagentbot.db
      # Docker creates it as a directory if it doesn't exist, which breaks SQLite.
      - type: bind
        source: /data/paulagentbot.db
        target: /data/paulagentbot.db
      # Optional: override agent-config (skills/MCPs) without rebuilding the image.
      # Copy agent-config/ to /data/agent-config on the host, then uncomment:
      # - type: bind
      #   source: /data/agent-config
      #   target: /app/agent-config
      #   read_only: true
    environment:
      DATABASE_URL: file:/data/paulagentbot.db
      REDIS_URL: redis://redis:6379
      WORKSPACE_BASE: /data/workspaces
      # Prevent the web process from starting BullMQ workers + Telegram bot.
      # The dedicated paulagentbot-worker container handles all background work.
      WORKER_ONLY: "true"
    ports:
      # Only bind to localhost — Caddy is the public-facing proxy
      - "127.0.0.1:3000:3000"

  # ── PaulAgentBot worker (BullMQ agent runner) ─────────────────────────────────────
  paulagentbot-worker:
    image: ${PAULAGENTBOT_IMAGE}
    restart: unless-stopped
    command: ["node", "workers-entrypoint.js"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Same Claude auth mount as the web service — worker spawns the claude CLI
      - type: bind
        source: ${CLAUDE_AUTH_DIR}
        target: /root/.claude
        read_only: true
      - type: bind
        source: /data/workspaces
        target: /data/workspaces
      - type: bind
        source: /data/paulagentbot.db
        target: /data/paulagentbot.db
    environment:
      DATABASE_URL: file:/data/paulagentbot.db
      REDIS_URL: redis://redis:6379
      WORKSPACE_BASE: /data/workspaces
      WORKER_ONLY: "true"
    # No port mapping — worker is internal only

  # ── Caddy (TLS + reverse proxy) ───────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # TLS certs on EBS — survives container recreation, avoids Let's Encrypt rate limits
      - /data/caddy:/data
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    environment:
      PAULAGENTBOT_DOMAIN: ${PAULAGENTBOT_DOMAIN}
    depends_on:
      - paulagentbot

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  redis_data:
