name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: paulagentbot
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      id-token: write
      contents: read

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── AWS credentials via OIDC (no long-lived access keys) ─────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      # ── Log in to ECR ─────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push Docker image ─────────────────────────────────────────────
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          docker build \
            --cache-from "$REGISTRY/$ECR_REPOSITORY:latest" \
            --tag "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --tag "$REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # ── Deploy to EC2 via SSH ─────────────────────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          AWS_REGION: ${{ env.AWS_REGION }}
          IMAGE_TAG: sha-${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,AWS_REGION,IMAGE_TAG,ECR_REPOSITORY
          script: |
            # Authenticate Docker with ECR
            aws ecr get-login-password --region $AWS_REGION \
              | docker login --username AWS --password-stdin $ECR_REGISTRY

            # Update image reference and restart
            cd /home/ubuntu/paulagentbot
            export PAULAGENTBOT_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
            sed -i "s|PAULAGENTBOT_IMAGE=.*|PAULAGENTBOT_IMAGE=$PAULAGENTBOT_IMAGE|" .env || \
              echo "PAULAGENTBOT_IMAGE=$PAULAGENTBOT_IMAGE" >> .env

            docker compose pull
            docker compose up -d --remove-orphans

            # Clean up old tagged images — keep only the 3 most recent sha- tags
            docker images --format '{{.Repository}}:{{.Tag}}' \
              | grep "$ECR_REGISTRY/$ECR_REPOSITORY:sha-" \
              | tail -n +4 \
              | xargs -r docker rmi || true
            docker image prune -f

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${{ steps.build-image.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Host:** ${{ secrets.EC2_HOST }}" >> "$GITHUB_STEP_SUMMARY"
